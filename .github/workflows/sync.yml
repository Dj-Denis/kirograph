name: Sync upstream
on:
  schedule:
    - cron:  '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Add upstream & fetch
        run: |
          git remote add upstream https://github.com/davide-desio-eleva/kirograph.git
          git fetch upstream

      - name: Check upstream changes
        id: upstream
        run: |
          UPSTREAM_SHA=$(git rev-parse upstream/main)

          if git merge-base --is-ancestor $UPSTREAM_SHA origin/main; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

          echo "sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT

      - name: Apply upstream changes locally
        run: |
          git fetch upstream
          git merge upstream/main --no-edit
            # ------------------------
            # ❄️ NIX: update lockfile
            # ------------------------

      - name: Install Nix
        if: steps.upstream.outputs.changed == 'true'
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Enable flakes
        if: steps.upstream.outputs.changed == 'true'
        run: |
          mkdir -p ~/.config/nix
          echo "experimental-features = nix-command flakes" >> ~/.config/nix/nix.conf

      - name: Update lockfile
        if: steps.upstream.outputs.changed == 'true'
        run: nix run .#update-lockfile

      # ------------------------
      # 🧪 BUILD CHECK (IMPORTANT)
      # ------------------------

      - name: Build flake
        if: steps.upstream.outputs.changed == 'true'
        id: build
        run: |
          set +e
          nix build .#kirograph 2>&1 | tee build.log
          STATUS=$?

          if [ $STATUS -ne 0 ]; then
            echo "failed=true" >> $GITHUB_OUTPUT
          else
            echo "failed=false" >> $GITHUB_OUTPUT
          fi

          exit 0

      - name: Upload build log
        if: steps.build.outputs.failed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: nix-build-log
          path: build.log

      # ------------------------
      # 📦 Diff generation
      # ------------------------

      - name: Check diff
        if: steps.upstream.outputs.changed == 'true'
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      - name: Generate diff summary
        if: steps.upstream.outputs.changed == 'true'
        run: |
          echo "### 🔄 Upstream commits (last 20)" > diff.md

          git log origin/main..upstream/main \
            --pretty=format:"- %s" -n 20 >> diff.md

          echo "" >> diff.md
          echo "### 📦 Lockfile changes" >> diff.md
          echo "- See artifact for full diff" >> diff.md

          echo "" >> diff.md
          echo "### 📊 Summary" >> diff.md
          git diff --stat >> diff.md
      - name: Export full lockfile diff
        run: |
          mkdir -p artifacts

          echo "FULL UPSTREAM COMMITS" > artifacts/full.log
          git log origin/main..upstream/main --oneline >> artifacts/full.log

          echo "" >> artifacts/full.log
          echo "FULL LOCKFILE DIFF" >> artifacts/full.log
          git diff -- package-lock.json >> artifacts/full.log || true

          echo "" >> artifacts/full.log
          echo "FULL REPO DIFF (UPSTREAM)" >> artifacts/full.log
          git diff origin/main..upstream/main >> artifacts/full.log || true
      - name: Export full upstream diff
        if: steps.upstream.outputs.changed == 'true'
        run: |
          mkdir -p artifacts

          echo "=== FULL UPSTREAM COMMITS ===" > artifacts/upstream.log
          git log origin/main..upstream/main --oneline >> artifacts/upstream.log

          echo "" >> artifacts/upstream.log
          echo "=== FULL DIFF ===" >> artifacts/upstream.log
          git diff origin/main..upstream/main >> artifacts/upstream.log
      - name: Upload full diff artifact
        if: steps.upstream.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: upstream-full-diff
          path: artifacts/upstream.log
      - name: Read diff into variable
        if: steps.upstream.outputs.changed == 'true'
        id: diffcontent
        run: |
          echo "body<<EOF" >> $GITHUB_OUTPUT
          cat diff.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ------------------------
      # 🔁 PR creation (always)
      # ------------------------

      - name: Create Pull Request
        if: steps.upstream.outputs.changed == 'true'
        id: pr
        uses: peter-evans/create-pull-request@v8
        with:
          branch: sync/upstream
          delete-branch: true
          commit-message: |
            chore: sync upstream + update lockfile (nix)
          title: "Sync upstream + lockfile update"
          body: |
            ## 🔄 Automated Sync (Nix-first)

            - Synced upstream changes
            - Updated package-lock via Nix
            - Build check executed

            ---

            ### 🔄 Upstream commits (last 20)

            ${{ steps.diffcontent.outputs.body }}

            ---

            ### 📦 Lockfile changes
            See workflow artifact: **upstream-full-diff**

      # ------------------------
      # 💬 COMMENT IF BUILD FAILED
      # ------------------------

      - name: Comment build failure
        if: steps.build.outputs.failed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## ❌ Nix build failed

            The automated build check failed after syncing upstream.

            ### Logs
            Build logs are attached as workflow artifacts.

            ### SHA
            ${context.payload.repository?.default_branch || ''}

            Please inspect \`nix build .#kirograph\`.
            `;

            // Find PR for this branch
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              head: `${context.repo.owner}:sync/upstream`
            });

            if (prs.data.length > 0) {
              const pr = prs.data[0];

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body
              });
            }
